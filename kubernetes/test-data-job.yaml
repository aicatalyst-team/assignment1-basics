apiVersion: batch/v1
kind: Job
metadata:
  name: cs336-test-data
  namespace: poc-assignment1-basics
  labels:
    app: cs336-basics
    autopoc.io/project: assignment1-basics
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 180
  template:
    spec:
      containers:
        - name: cs336-basics
          image: quay.io/aicatalyst/assignment1-basics:latest
          imagePullPolicy: Always
          command: ["python", "-m", "pytest"]
          args: ["tests/test_data.py", "-v", "--timeout=60", "--tb=short"]
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Never
